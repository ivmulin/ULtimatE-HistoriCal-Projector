  <style>
    :root {

    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      background: var(--bg);

    }

    /* ── Шапка ── */
    header {

      line-height: 1.4;

      color: #b09070;
      font-style: italic;
    }

      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      padding: 0.75rem 2rem 0.75rem;
      border-bottom: 2px solid #4a2e10;
    }

      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

      width: 100%;
      padding: 0.55rem 1rem 0.55rem 2.6rem;
      border: 1px solid #5a3a18;
      border-radius: 30px;
      background: #3a2210;
      color: var(--nav-text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #search::placeholder { color: #806040; }
    #search:focus { border-color: var(--accent-mid); background: #44280f; }
    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: #806040;
      font-size: 1rem;
      pointer-events: none;
    }

      text-align: center;
      font-size: 0.78rem;
      color: #806040;
      margin-top: 0.3rem;
      height: 1.1em;
      font-family: sans-serif;
    }

      position: sticky;
      top: 84px;
      z-index: 90;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      box-shadow: var(--shadow);
    }
    .alpha-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 4px;
      font-family: "Georgia", serif;
      font-size: 0.9rem;
      font-weight: bold;
      text-decoration: none;
      color: var(--accent);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .alpha-btn:hover {
      background: var(--accent-light);
      border-color: var(--accent-mid);
    }
    .alpha-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .alpha-btn.inactive {
      color: #c5b8a8;
      cursor: default;
      pointer-events: none;
    }

      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;

      margin-top: 2.5rem;

      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .letter-heading .letter-char {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--accent);
      line-height: 1;
      width: 2.5rem;
      text-align: center;
    }
    .letter-heading .letter-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-mid);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem 1rem;

      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;

      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: sans-serif;
      min-width: 1.5rem;
    }
    .entry-word {
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

      font-family: "Arial", sans-serif;
      font-size: 0.72rem;
      font-style: italic;
      background: var(--pos-bg);
      color: var(--pos-text);
      padding: 0.15em 0.55em;
      border-radius: 3px;
      white-space: nowrap;

    .entry-def {
      font-size: 0.97rem;
      color: var(--text);
      margin-bottom: 0.65rem;
      line-height: 1.6;
    }

      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

      background: var(--cit-bg);
      border-left: 2px solid var(--border);
      border-radius: 0 3px 3px 0;
      padding: 0.4rem 0.8rem;
      font-size: 0.88rem;
      line-height: 1.55;
    }
    .cit-label {
      font-family: "Arial", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.15rem;
    }
    .cit-text {
      font-style: italic;
      color: #3a2e1e;
    }
    .cit-source {
      font-style: italic;
      color: #6b5c45;
    }

    /* ── Выделение при поиске ── */
    mark {
      background: #ffe066;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Пустой результат ── */
    #no-results {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-style: italic;

    .total-count {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: sans-serif;
      margin-bottom: 1rem;
    }

    /* ── Адаптив ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.2rem; }
      main { padding: 1rem 1rem 3rem; }
      .alpha-btn { width: 1.7rem; height: 1.7rem; font-size: 0.8rem; }
    }
  </style>
</head>

/* ─── Вспомогательные функции ─── */
function esc(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function firstChar(word) {
  return word[0].toUpperCase();
}

function highlight(text, query) {
  if (!query) return esc(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

/* ─── Построение DOM ─── */
function buildEntries() {
  const root = document.getElementById('entries-root');
  const letters = {};

  ENTRIES.forEach(e => {
    const ch = firstChar(e.word);
    if (!letters[ch]) letters[ch] = [];
    letters[ch].push(e);
  });

  Object.keys(letters).sort((a,b) => a.localeCompare(b,'ru')).forEach(ch => {
    const sec = document.createElement('section');
    sec.className = 'letter-section';
    sec.id = 'letter-' + ch;
    sec.dataset.letter = ch;

    sec.innerHTML = `<div class="letter-heading">
      <span class="letter-char">${ch}</span>
      <span class="letter-line"></span>
    </div>`;

    letters[ch].forEach(e => {
      const div = document.createElement('article');
      div.className = 'entry';
      div.dataset.word = e.word.toLowerCase();
      div.dataset.pos = e.pos.toLowerCase();
      div.dataset.def = e.def.toLowerCase();
      div.dataset.cit1 = e.cit1.toLowerCase();
      div.dataset.cit2 = e.cit2.toLowerCase();

      div.innerHTML = `
        <div class="entry-head">
          <span class="entry-number">${e.n}.</span>
          <span class="entry-word">${esc(e.word)}</span>
          <span class="entry-pos">${esc(e.pos)}</span>
        </div>
        <div class="entry-def">${esc(e.def)}</div>
        <div class="citations">
          <div class="cit">
            <div class="cit-label">Из «Юности честного зерцала»</div>
            <div class="cit-text">«${esc(e.cit1)}»</div>
          </div>
          <div class="cit">
            <div class="cit-label">Из других произведений</div>
            <div class="cit-text cit-source">«${esc(e.cit2)}» — <em>${esc(e.src2)}</em></div>
          </div>
        </div>`;
      sec.appendChild(div);
    });

    root.appendChild(sec);
  });
}

/* ─── Алфавитная навигация ─── */
const ALPHABET = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('');
const presentLetters = new Set(ENTRIES.map(e => firstChar(e.word)));

function buildAlphaNav() {
  const nav = document.getElementById('alpha-nav');
  ALPHABET.forEach(ch => {
    const btn = document.createElement('a');
    btn.textContent = ch;
    btn.className = 'alpha-btn' + (presentLetters.has(ch) ? '' : ' inactive');
    btn.dataset.letter = ch;
    if (presentLetters.has(ch)) {
      btn.href = '#letter-' + ch;
      btn.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById('letter-' + ch)?.scrollIntoView({behavior:'smooth', block:'start'});
        setActiveAlpha(ch);
      });
    }
    nav.appendChild(btn);
  });
}

function setActiveAlpha(ch) {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  const target = document.querySelector(`.alpha-btn[data-letter="${ch}"]`);
  if (target) target.classList.add('active');
}

/* ─── Поиск и фильтрация ─── */
function doSearch(raw) {
  const q = raw.trim().toLowerCase();
  let visible = 0;

  document.querySelectorAll('section.letter-section').forEach(sec => {
    let secVisible = 0;
    sec.querySelectorAll('article.entry').forEach(art => {
      const match = !q
        || art.dataset.word.includes(q)
        || art.dataset.pos.includes(q)
        || art.dataset.def.includes(q)
        || art.dataset.cit1.includes(q)
        || art.dataset.cit2.includes(q);

      art.classList.toggle('hidden', !match);
      if (match) {
        secVisible++;
        visible++;
        if (q) applyHighlight(art, q);
        else removeHighlight(art);
      }
    });
    sec.style.display = secVisible ? '' : 'none';
  });

  document.getElementById('no-results').style.display = visible ? 'none' : 'block';
  const cnt = document.getElementById('search-count');
  cnt.textContent = q ? `Найдено статей: ${visible}` : '';
  document.getElementById('total-count').textContent = q ? '' : `Всего статей: ${ENTRIES.length}`;
}

function applyHighlight(art, q) {
  ['entry-word','entry-def'].forEach(cls => {
    const el = art.querySelector('.' + cls);
    if (el) el.innerHTML = highlight(el.textContent, q);
  });
  art.querySelectorAll('.cit-text, .entry-pos').forEach(el => {
    el.innerHTML = highlight(el.textContent, q);
  });
}

function removeHighlight(art) {
  art.querySelectorAll('[data-orig]').forEach(el => {
    el.textContent = el.dataset.orig;
  });
  // restore from dataset
  const word = art.dataset.word;
  art.querySelector('.entry-word').textContent = ENTRIES.find(e => e.word.toLowerCase() === word)?.word || '';
  // simplest: re-render
  const n = parseInt(art.querySelector('.entry-number').textContent);
  const e = ENTRIES.find(x => x.n === n);
  if (e) {
    art.querySelector('.entry-word').innerHTML = esc(e.word);
    art.querySelector('.entry-pos').innerHTML = esc(e.pos);
    art.querySelector('.entry-def').innerHTML = esc(e.def);
    const cits = art.querySelectorAll('.cit-text');
    if (cits[0]) cits[0].innerHTML = `«${esc(e.cit1)}»`;
    if (cits[1]) cits[1].innerHTML = `«${esc(e.cit2)}» — <em>${esc(e.src2)}</em>`;
  }
}

/* ─── Инициализация ─── */
buildEntries();
buildAlphaNav();
document.getElementById('total-count').textContent = `Всего статей: ${ENTRIES.length}`;

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => doSearch(searchInput.value));

/* Подсветка активной буквы при прокрутке */
const observer = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (en.isIntersecting) {
      setActiveAlpha(en.target.dataset.letter);
    }
  });
}, { rootMargin: '-20% 0px -75% 0px' });

document.querySelectorAll('section.letter-section').forEach(s => observer.observe(s));
</script>
